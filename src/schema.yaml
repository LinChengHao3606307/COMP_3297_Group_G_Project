openapi: 3.0.3
info:
  title: 'BetaTrax: Defect Report management API'
  version: 1.0.0
  description: BetaTrax is a Software as a Service (SaaS) model to deliver those applications to its customers; each product is cloud-hosted and accessed by customers via the internet. BetaTrax uses a scheduled release strategy. For each of its products, this includes a beta testing program as a component of quality assurance. Managing the defects reported by beta testers is the focus of your project.
paths:
  /developer-metrics/:
    get:
      summary: List Developer Metrics
      operationId: developer_metrics_list
      tags:
      - developer-metrics
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeveloperMetrics'
          description: ''
  /developer-metrics/{id}/:
    get:
      summary: Retrieve individual Developer Metrics
      operationId: developer_metrics_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - developer-metrics
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperMetrics'
          description: ''
  /products/:
    get:
      summary: List Products
      operationId: products_list
      tags:
      - products
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDetail'
          description: ''
    post:
      operationId: products_create
      summary: Create a new Product
      description: 'Only Product owners can create products. The owner is automatically set to the authenticated user making the request.'
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProductCreation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductCreation'
        required: true
      security:
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCreation'
          description: ''
  /products/{email_prefix}/:
    get:
      operationId: products_retrieve
      summary: Retrieve individual Product by email prefix of Product owner
      parameters:
      - in: path
        name: email_prefix
        schema:
          type: string
          pattern: ^[a-zA-Z_][\w-]*$
        required: true
      tags:
      - products
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
          description: ''
  /products/{id}/:
    get:
      operationId: products_retrieve_2
      summary: Retrieve individual Product instance
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this product.
        required: true
      tags:
      - products
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
          description: ''
    put:
      operationId: products_update
      summary: Update a Product instance
      description: 'Only the owner of the product can update products. The owner field is read-only and cannot be changed.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this product.
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProductDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductDetail'
        required: true
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
          description: ''
    delete:
      operationId: products_destroy
      summary: Delete a Product instance
      description: 'Only the owner of the product can delete products.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this product.
        required: true
      tags:
      - products
      security:
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /products/{products_pk}/report/:
    get:
      operationId: products_report_list
      summary: List Reports for a Product
      description: 'Retrieve a list of reports associated with a specific product.'
      parameters:
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: query
        name: orderByTime
        schema:
          type: string
          enum:
            - asc
            - desc
        required: false
        description: Order the reports by time (creation or update time). Use "asc" for oldest first, "desc" for newest first.
        example: desc
      tags:
      - products
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReportDetail'
          description: ''
    post:
      operationId: products_report_create
      summary: Create a new Report for a Product
      description: 'Submit a new report associated with a specific product. Only testers can create reports. The product field is automatically set to the product identified by products_pk in the URL. The status field is automatically set to "New". Email field is automatically set to the registered email of the tester if left blank.'
      parameters:
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportSubmission'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReportSubmission'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReportSubmission'
        required: true
      security:
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSubmission'
          description: ''
  /products/{products_pk}/report/{email_prefix}/:
    get:
      operationId: products_report_retrieve
      summary: Retrieve individual Report by email prefix of claimed developer
      parameters:
      - in: path
        name: email_prefix
        schema:
          type: string
          pattern: ^[a-zA-Z_][\w-]*$
        required: true
      - in: query
        name: orderByTime
        schema:
          type: string
          enum:
            - asc
            - desc
        required: false
        description: Order the reports by time (creation or update time). Use "asc" for oldest first, "desc" for newest first.
        example: desc
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDetail'
          description: ''
  /products/{products_pk}/report/{id}/:
    get:
      operationId: products_report_retrieve_2
      summary: Retrieve individual Report instance
      description: 'Retrieve the details of a specific report associated with a product.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this report.
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDetail'
          description: ''
    put:
      operationId: products_report_update
      summary: Update a Report instance
      description: 'Only the owner of the product and developers can use this endpoint. The product owner can update all fields except Assigned_to / Fixed / Cannot to be reproduced and use this to update report status. Developers can only update the Assigned_to / Fixed / Cannot be reproduced field to claim / unclaim / mark as cannot be reproduced a report assigned to them. The assigned_to field is automatically set to the developer claiming the report when the fixed field is set to true. The assigned_to field is automatically cleared when the fixed field is set to false.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this report.
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReportUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReportUpdate'
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportUpdate'
          description: ''
    delete:
      operationId: products_report_destroy
      summary: Delete a Report instance
      description: 'Only the owner of the product can delete reports.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this report.
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /products/{products_pk}/report/{report_pk}/comments/:
    get:
      operationId: products_report_comments_list
      summary: List comments for a Report
      description: 'Retrieve a list of comments associated with a specific report.'
      parameters:
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
          description: ''
    post:
      operationId: products_report_comments_create
      summary: Create a new Comment for a Report
      description: 'Submit a new comment associated with a specific report'
      parameters:
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Comment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Comment'
        required: true
      security:
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
          description: ''
  /products/{products_pk}/report/{report_pk}/comments/{id}/:
    get:
      operationId: products_report_comments_retrieve
      summary: Retrieve individual Comment instance
      description: 'Retrieve the details of a specific comment associated with a report.'
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
          description: ''
    put:
      operationId: products_report_comments_update
      summary: Update a Comment instance
      description: 'Only the author of a comment can update it.'
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Comment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Comment'
        required: true
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
          description: ''
    delete:
      summary: Delete a Comment instance
      description: 'Only the author of a comment can delete it.'
      operationId: products_report_comments_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /users/:
    get:
      summary: List Users
      operationId: users_list
      tags:
      - users
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
    post:
      summary: Register a new user
      description: 'Create a new user account. The role field determines the role of the user being registered (PO, DEV, or TESTER). No need to be authenticated to access this endpoint.'
      operationId: users_register_create
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistration'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /users/{id}/:
    get:
      summary: Retrieve individual User instance
      operationId: users_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      summary: Update a User instance
      description: 'Users can update their own information and change their password.'
      operationId: users_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/User'
        required: true
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: users_destroy
      summary: Delete a User instance
      description: 'Only the user themselves can delete their own account.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      security:
      - basicAuth: []
      responses:
        '204':
          description: No response body
components:
  schemas:
    Comment:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
      - url
    DeveloperMetrics:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email Address
          maxLength: 254
        fixed_report:
          type: integer
          readOnly: true
        reopened_report:
          type: integer
          readOnly: true
        reopened_ratio:
          type: string
          readOnly: true
        effectiveness:
          type: string
          readOnly: true
      required:
      - effectiveness
      - email
      - fixed_report
      - id
      - reopened_ratio
      - reopened_report
      - url
    PatchedComment:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedProductDetail:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        version:
          type: string
          maxLength: 20
        owner:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        reports:
          type: string
          readOnly: true
        report_count:
          type: integer
          readOnly: true
    PatchedReportDetail:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        title:
          type: string
        description:
          type: string
        status:
          type: string
          readOnly: true
        severity:
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        priority:
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        product:
          type: string
        assigned_to:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        email:
          type: string
        comment_count:
          type: integer
          readOnly: true
        comments:
          type: string
          readOnly: true
        duplicated_to:
          type: string
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email Address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          maxLength: 128
    PriorityEnum:
      enum:
      - Critical
      - High
      - Medium
      - Low
      type: string
      description: |-
        * `Critical` - Critical
        * `High` - High
        * `Medium` - Medium
        * `Low` - Low
    ProductCreation:
      type: object
      properties:
        owner:
          type: integer
          readOnly: true
          nullable: true
        name:
          type: string
          maxLength: 100
        version:
          type: string
          maxLength: 20
      required:
      - name
      - owner
      - version
    ProductDetail:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        version:
          type: string
          maxLength: 20
        owner:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        reports:
          type: string
          readOnly: true
        report_count:
          type: integer
          readOnly: true
      required:
      - id
      - name
      - owner
      - report_count
      - reports
      - url
      - version
    ReportDetail:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        title:
          type: string
        description:
          type: string
        status:
          type: string
          readOnly: true
        severity:
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        priority:
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        product:
          type: string
        assigned_to:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        email:
          type: string
        comment_count:
          type: integer
          readOnly: true
        comments:
          type: string
          readOnly: true
        duplicated_to:
          type: string
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - assigned_to
      - comment_count
      - comments
      - description
      - duplicated_to
      - id
      - product
      - status
      - title
      - updated_at
      - url
    ReportSubmission:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        title:
          type: string
        description:
          type: string
        steps_to_reproduce:
          type: string
        email:
          type: string
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - id
      - steps_to_reproduce
      - title
      - updated_at
      - url
    ReportUpdate:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/StatusEnum'
        priority:
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        severity:
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        duplicated_to:
          type: integer
          nullable: true
    RoleEnum:
      enum:
      - PO
      - DEV
      - TESTER
      type: string
      description: |-
        * `PO` - PO
        * `DEV` - DEV
        * `TESTER` - TESTER
    SeverityEnum:
      enum:
      - Critical
      - Major
      - Minor
      - Low
      type: string
      description: |-
        * `Critical` - Critical
        * `Major` - Major
        * `Minor` - Minor
        * `Low` - Low
    StatusEnum:
      enum:
      - New
      - Open
      - Rejected
      - Assigned
      - Fixed
      - Resolved
      - Reopened
      - Duplicate
      - Cannot Reproduce
      type: string
      description: |-
        * `New` - New
        * `Open` - Open
        * `Rejected` - Rejected
        * `Assigned` - Assigned
        * `Fixed` - Fixed
        * `Resolved` - Resolved
        * `Reopened` - Reopened
        * `Duplicate` - Duplicate
        * `Cannot Reproduce` - Cannot Reproduce
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email Address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          maxLength: 128
      required:
      - email
      - id
      - password
    UserRegistration:
      type: object
      properties:
        email:
          type: string
          format: email
          title: Email Address
          maxLength: 254
        password:
          type: string
          writeOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - email
      - password
      - role
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
