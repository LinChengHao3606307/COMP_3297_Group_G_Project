openapi: 3.0.3
info:
  title: 'BetaTrax: Defect Report management API'
  version: 0.1.0
  description: API documentation for the components of BetaTrax
paths:
  /developer-metrics/:
    get:
      operationId: developer_metrics_list
      tags:
      - developer-metrics
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeveloperMetrics'
          description: ''
  /developer-metrics/{id}/:
    get:
      operationId: developer_metrics_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - developer-metrics
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperMetrics'
          description: ''
  /products/:
    get:
      operationId: products_list
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDetail'
          description: ''
    post:
      operationId: products_create
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProductCreation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductCreation'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCreation'
          description: ''
  /products/{email_prefix}/:
    get:
      operationId: products_retrieve
      parameters:
      - in: path
        name: email_prefix
        schema:
          type: string
          pattern: ^[a-zA-Z_][\w-]*$
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
          description: ''
  /products/{id}/:
    get:
      operationId: products_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this product.
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
          description: ''
    put:
      operationId: products_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this product.
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProductDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductDetail'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
          description: ''
    delete:
      operationId: products_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this product.
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /products/{products_pk}/report/:
    get:
      operationId: products_report_list
      parameters:
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReportDetail'
          description: ''
    post:
      operationId: products_report_create
      parameters:
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportSubmission'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReportSubmission'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReportSubmission'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSubmission'
          description: ''
  /products/{products_pk}/report/{email_prefix}/:
    get:
      operationId: products_report_retrieve
      parameters:
      - in: path
        name: email_prefix
        schema:
          type: string
          pattern: ^[a-zA-Z_][\w-]*$
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDetail'
          description: ''
  /products/{products_pk}/report/{id}/:
    get:
      operationId: products_report_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this report.
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDetail'
          description: ''
    put:
      operationId: products_report_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this report.
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReportUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReportUpdate'
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportUpdate'
          description: ''
    delete:
      operationId: products_report_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this report.
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /products/{products_pk}/report/{report_pk}/comments/:
    get:
      operationId: products_report_comments_list
      parameters:
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
          description: ''
    post:
      operationId: products_report_comments_create
      parameters:
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Comment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Comment'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
          description: ''
  /products/{products_pk}/report/{report_pk}/comments/{id}/:
    get:
      operationId: products_report_comments_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
          description: ''
    put:
      operationId: products_report_comments_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Comment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Comment'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
          description: ''
    delete:
      operationId: products_report_comments_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: path
        name: products_pk
        schema:
          type: string
        required: true
      - in: path
        name: report_pk
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /users/:
    get:
      operationId: users_list
      tags:
      - users
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
    post:
      operationId: users_create
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/User'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /users/{id}/:
    get:
      operationId: users_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: users_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/User'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: users_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /users/register/:
    post:
      operationId: users_register_create
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistration'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
components:
  schemas:
    BlankEnum:
      enum:
      - ''
    Comment:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
      - url
    DeveloperMetrics:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email Address
          maxLength: 254
        fixed_report:
          type: integer
          readOnly: true
        reopened_report:
          type: integer
          readOnly: true
        reopened_ratio:
          type: string
          readOnly: true
        effectiveness:
          type: string
          readOnly: true
      required:
      - effectiveness
      - email
      - fixed_report
      - id
      - reopened_ratio
      - reopened_report
      - url
    PatchedComment:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedProductDetail:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        version:
          type: string
          maxLength: 20
        owner:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        reports:
          type: string
          readOnly: true
        report_count:
          type: integer
          readOnly: true
    PatchedReportDetail:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        title:
          type: string
        description:
          type: string
        status:
          type: string
          readOnly: true
        severity:
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        priority:
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        product:
          type: string
        assigned_to:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        email:
          type: string
        comment_count:
          type: integer
          readOnly: true
        comments:
          type: string
          readOnly: true
        duplicated_to:
          type: string
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email Address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          maxLength: 128
    PriorityEnum:
      enum:
      - Critical
      - High
      - Medium
      - Low
      type: string
      description: |-
        * `Critical` - Critical
        * `High` - High
        * `Medium` - Medium
        * `Low` - Low
    ProductCreation:
      type: object
      properties:
        owner:
          type: integer
          readOnly: true
          nullable: true
        name:
          type: string
          maxLength: 100
        version:
          type: string
          maxLength: 20
      required:
      - name
      - owner
      - version
    ProductDetail:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        version:
          type: string
          maxLength: 20
        owner:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        reports:
          type: string
          readOnly: true
        report_count:
          type: integer
          readOnly: true
      required:
      - id
      - name
      - owner
      - report_count
      - reports
      - url
      - version
    ReportDetail:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        title:
          type: string
        description:
          type: string
        status:
          type: string
          readOnly: true
        severity:
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        priority:
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        product:
          type: string
        assigned_to:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        email:
          type: string
        comment_count:
          type: integer
          readOnly: true
        comments:
          type: string
          readOnly: true
        duplicated_to:
          type: string
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - assigned_to
      - comment_count
      - comments
      - description
      - duplicated_to
      - id
      - product
      - status
      - title
      - updated_at
      - url
    ReportSubmission:
      type: object
      properties:
        url:
          type: string
          readOnly: true
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        title:
          type: string
        description:
          type: string
        steps_to_reproduce:
          type: string
        email:
          type: string
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - id
      - steps_to_reproduce
      - title
      - updated_at
      - url
    ReportUpdate:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/StatusEnum'
        priority:
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        severity:
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        duplicated_to:
          type: integer
          nullable: true
    RoleEnum:
      enum:
      - PO
      - DEV
      - TESTER
      type: string
      description: |-
        * `PO` - PO
        * `DEV` - DEV
        * `TESTER` - TESTER
    SeverityEnum:
      enum:
      - Critical
      - Major
      - Minor
      - Low
      type: string
      description: |-
        * `Critical` - Critical
        * `Major` - Major
        * `Minor` - Minor
        * `Low` - Low
    StatusEnum:
      enum:
      - New
      - Open
      - Rejected
      - Assigned
      - Fixed
      - Resolved
      - Reopened
      - Duplicate
      - Cannot Reproduce
      type: string
      description: |-
        * `New` - New
        * `Open` - Open
        * `Rejected` - Rejected
        * `Assigned` - Assigned
        * `Fixed` - Fixed
        * `Resolved` - Resolved
        * `Reopened` - Reopened
        * `Duplicate` - Duplicate
        * `Cannot Reproduce` - Cannot Reproduce
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email Address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          maxLength: 128
      required:
      - email
      - id
      - password
    UserRegistration:
      type: object
      properties:
        email:
          type: string
          format: email
          title: Email Address
          maxLength: 254
        password:
          type: string
          writeOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - email
      - password
      - role
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
